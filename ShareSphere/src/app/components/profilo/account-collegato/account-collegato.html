<div class="collega-card">
  <h2 class="collega-title">Collega Account Gaming</h2>

  <div class="form-group">
    <label>Piattaforma</label>
    <input [(ngModel)]="filtro" (input)="cercaPiattaforma()" type="text" placeholder="Es. Steam, PlayStation...">
    @if (suggerimenti.length > 0) {
      <div class="autocomplete">
        @for (s of suggerimenti; track s) {
          <div class="autocomplete-item" (click)="selezionaPiattaforma(s)">{{ s }}</div>
        }
      </div>
    }
  </div>

  <div class="form-group">
    <label>Email account</label>
    <input [(ngModel)]="email" type="email" placeholder="email@esempio.com">
  </div>

  <div class="form-group">
    <label>Password</label>
    <input [(ngModel)]="password" type="password" placeholder="••••••••">
  </div>

  <button class="btn-collega" (click)="collegaAccount()">Collega Account</button>

  @if (messaggio) {
    <p class="hint-success">{{ messaggio }}</p>
  }
</div>
