<div class="modifica-card">
  <h2 class="modifica-title">Modifica Profilo</h2>

  <div class="form-group">
    <label>Nome</label>
    <input [(ngModel)]="nome" type="text" placeholder="Il tuo nome">
  </div>

  <div class="form-group">
    <label>Username</label>
    <input [(ngModel)]="username" type="text" [disabled]="usernameBloccato" placeholder="@username">
    @if (usernameBloccato) {
      <p class="hint-error">Puoi modificare lo username solo una volta al mese.</p>
    }
  </div>

  <div class="form-group">
    <label>Descrizione</label>
    <textarea [(ngModel)]="descrizione" placeholder="Raccontati alla community..." rows="3"></textarea>
  </div>

  <div class="form-group">
    <label>Foto Profilo</label>
    <input type="file" (change)="caricaFoto($event)">
    @if (fotoProfilo) {
      <img [src]="fotoProfilo" class="preview-img">
    }
  </div>

  <button class="btn-salva" (click)="salvaProfilo()">Salva Modifiche</button>

  @if (messaggio) {
    <p class="hint-success">{{ messaggio }}</p>
  }
</div>
