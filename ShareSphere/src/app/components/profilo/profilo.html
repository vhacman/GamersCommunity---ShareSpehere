<div *ngIf="!showModifica && !showCollega"
style="margin:0;background:linear-gradient(135deg,#0f0f0f,#1a1a2e);color:white;padding:40px;font-family:Orbitron;min-height:100vh;">

<div style="max-width:1100px;margin:auto;">

<!-- HEADER -->
<div style="background:#141414;padding:30px;border-radius:20px;box-shadow:0 0 20px #00f7ff40;margin-bottom:40px;">
<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;">

<div style="display:flex;align-items:center;gap:20px;">
<img [src]="fotoProfilo"
style="width:140px;height:140px;border-radius:50%;border:4px solid #00f7ff;box-shadow:0 0 20px #00f7ff;object-fit:cover;">

<div>
<h1 style="margin:0;">{{nome}}</h1>
<p style="margin:5px 0;color:#00f7ff;">{{username}}</p>
</div>
</div>

<button (click)="apriModifica()"
style="background:#00f7ff;border:none;padding:12px 20px;border-radius:10px;font-weight:bold;cursor:pointer;">
✏️ Modifica Profilo
</button>

</div>

<div style="margin-top:20px;color:#ccc;max-width:800px;">
{{descrizione}}
</div>
</div>

<!-- AREE DI INTERESSE -->
<h2 style="border-left:4px solid #00f7ff;padding-left:10px;">
Aree di Interesse
<span *ngIf="interessi.length > 4"
(click)="toggleInteressi()"
style="color:#00f7ff;cursor:pointer;font-size:14px;margin-left:15px;">
{{ showAllInteressi ? 'Show Less' : 'Show All' }}
</span>
</h2>

<div style="display:flex;flex-wrap:wrap;gap:15px;margin:20px 0;">
<div *ngFor="let i of (showAllInteressi ? interessi : interessi | slice:0:4)"
style="background:#26263a;padding:10px 20px;border-radius:30px;">
{{i}}
</div>
</div>

<!-- BADGE -->
<h2 style="border-left:4px solid gold;padding-left:10px;">
Badge Ottenuti
<span *ngIf="badges.length > 4"
(click)="toggleBadges()"
style="color:gold;cursor:pointer;font-size:14px;margin-left:15px;">
{{ showAllBadges ? 'Show Less' : 'Show All' }}
</span>
</h2>

<div style="display:flex;flex-wrap:wrap;gap:20px;margin:20px 0;">
<div *ngFor="let badge of (showAllBadges ? badges : badges | slice:0:4)"
style="background:#1f1f2e;padding:20px;border-radius:15px;text-align:center;width:120px;">
<img [src]="badge.icona" style="width:60px;margin-bottom:10px;"><br>
{{badge.nome}}
</div>
</div>

<!-- ACCOUNT GAMING -->
<h2 style="border-left:4px solid #00f7ff;padding-left:10px;">
Account Gaming
<span *ngIf="accounts.length > 4"
(click)="toggleAccounts()"
style="color:#00f7ff;cursor:pointer;font-size:14px;margin-left:15px;">
{{ showAllAccounts ? 'Show Less' : 'Show All' }}
</span>
</h2>

<div style="display:flex;flex-wrap:wrap;gap:20px;margin:20px 0;">

<div *ngFor="let acc of (showAllAccounts ? accounts : accounts | slice:0:4)"
style="background:#1f1f2e;padding:20px;border-radius:15px;text-align:center;width:150px;">
<img [src]="iconePiattaforme[acc.nome] || 'https://via.placeholder.com/50'"
style="width:50px;margin-bottom:10px;"><br>
{{acc.nome}}
</div>

</div>

<button (click)="apriCollega()"
style="margin-top:10px;background:#8a2be2;border:none;padding:10px 20px;border-radius:10px;color:white;cursor:pointer;">
+ Collega Account
</button>

</div>
</div>

<!-- MODIFICA -->
<div *ngIf="showModifica" style="padding:40px;">
<button (click)="tornaProfilo()"
style="margin-bottom:20px;background:#444;padding:10px 20px;border:none;border-radius:10px;color:white;">
⬅ Torna al Profilo
</button>

<app-modifica-profilo></app-modifica-profilo>
</div>

<!-- COLLEGA -->
<div *ngIf="showCollega" style="padding:40px;">
<button (click)="tornaProfilo()"
style="margin-bottom:20px;background:#444;padding:10px 20px;border:none;border-radius:10px;color:white;">
⬅ Torna al Profilo
</button>

<app-account-collegato></app-account-collegato>
</div>
