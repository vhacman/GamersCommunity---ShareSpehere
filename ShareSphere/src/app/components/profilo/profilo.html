<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Orbitron', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
    color: white;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
}

.container {
    width: 100%;
    max-width: 1100px;
}

/* PROFILE HEADER */

.profile-card {
    background: #141414;
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 0 20px #00f7ff40;
    margin-bottom: 40px;
}

.profile-card img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid #00f7ff;
    box-shadow: 0 0 20px #00f7ff;
    margin-bottom: 15px;
}

.profile-card h1 {
    font-size: 28px;
    margin-bottom: 5px;
}

.profile-card p {
    color: #00f7ff;
    font-size: 14px;
}

/* STATS */

.stats {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 40px;
    flex-wrap: wrap;
}

.stat-box {
    flex: 1;
    min-width: 250px;
    background: #1f1f2e;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 15px #8a2be240;
    transition: 0.3s;
}

.stat-box:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 25px #8a2be2;
}

.stat-box h2 {
    font-size: 36px;
    color: #8a2be2;
}

.stat-box p {
    margin-top: 10px;
    font-size: 14px;
    color: #ccc;
}

/* SECTION TITLES */

.section-title {
    font-size: 22px;
    margin-bottom: 20px;
    border-left: 4px solid #00f7ff;
    padding-left: 10px;
}

/* INTEREST AREA */

.interests {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin-bottom: 40px;
}

.interest-tag {
    background: #26263a;
    padding: 10px 20px;
    border-radius: 30px;
    border: 1px solid #00f7ff50;
    transition: 0.3s;
    cursor: pointer;
}

.interest-tag:hover {
    background: #00f7ff;
    color: black;
}

/* BADGES */

.badges {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.badge {
    background: #1f1f2e;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 10px #ffd70040;
    transition: 0.3s;
}

.badge:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #ffd700;
}

.badge img {
    width: 60px;
    margin-bottom: 10px;
}

.badge p {
    font-size: 12px;
}

/* CONNECTED ACCOUNTS */

.accounts {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

.account {
    flex: 1;
    min-width: 180px;
    background: #1f1f2e;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    transition: 0.3s;
    cursor: pointer;
}

.account:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px #00f7ff;
}

.account img {
    width: 50px;
    margin-bottom: 10px;
}

.account p {
    font-size: 14px;
}

@media(max-width: 768px) {
    .stats {
        flex-direction: column;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- PROFILE -->
    <div class="profile-card">
        <img src="https://via.placeholder.com/140" alt="Profile Picture">
        <h1>Marco Rossi</h1>
        <p>@GamerXPro</p>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="stat-box">
            <h2>48</h2>
            <p>Challenge Completate</p>
        </div>
        <div class="stat-box">
            <h2>125</h2>
            <p>Amici</p>
        </div>
        <div class="stat-box">
            <h2>3.450</h2>
            <p>Punti Guadagnati</p>
        </div>
    </div>

    <!-- INTERESTS -->
    <h2 class="section-title">Area di Interesse</h2>
    <div class="interests">
        <div class="interest-tag">🎮 Giochi</div>
        <div class="interest-tag">⚽ Sport</div>
        <div class="interest-tag">🌍 Ambiente</div>
        <div class="interest-tag">🎵 Musica</div>
    </div>

    <!-- BADGES -->
    <h2 class="section-title">Badge Ottenuti</h2>
    <div class="badges">
        <div class="badge">
            <img src="https://cdn-icons-png.flaticon.com/512/2583/2583344.png">
            <p>First Win</p>
        </div>
        <div class="badge">
            <img src="https://cdn-icons-png.flaticon.com/512/2583/2583319.png">
            <p>Top Player</p>
        </div>
        <div class="badge">
            <img src="https://cdn-icons-png.flaticon.com/512/2583/2583434.png">
            <p>Champion</p>
        </div>
    </div>

    <!-- CONNECTED ACCOUNTS -->
    <h2 class="section-title">Account Collegati</h2>
    <div class="accounts">
        <div class="account">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png">
            <p>Steam</p>
        </div>
        <div class="account">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968866.png">
            <p>PlayStation</p>
        </div>
        <div class="account">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968874.png">
            <p>Xbox</p>
        </div>
        <div class="account">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968878.png">
            <p>Nintendo</p>
        </div>
    </div>

</div>

</body>
</html>
